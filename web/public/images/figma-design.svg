<svg width="800" height="600" viewBox="0 0 800 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="600" fill="#0a0a0a"/>
  
  <!-- Gradient Background -->
  <defs>
    <radialGradient id="grad1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1a0000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a0a;stop-opacity:1" />
    </radialGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#b91c1c;stop-opacity:0.3" />
    </linearGradient>
  </defs>
  
  <rect width="800" height="600" fill="url(#grad1)"/>
  
  <!-- Design Frames -->
  <g opacity="0.6">
    <!-- Frame 1 -->
    <rect x="50" y="100" width="200" height="300" rx="8" fill="none" stroke="#dc2626" stroke-width="2"/>
    <rect x="60" y="120" width="180" height="40" rx="4" fill="#dc2626" opacity="0.3"/>
    <rect x="60" y="170" width="180" height="100" rx="4" fill="#b91c1c" opacity="0.2"/>
    <rect x="60" y="280" width="80" height="30" rx="4" fill="#dc2626" opacity="0.4"/>
    
    <!-- Frame 2 -->
    <rect x="300" y="100" width="200" height="300" rx="8" fill="none" stroke="#b91c1c" stroke-width="2"/>
    <rect x="310" y="120" width="180" height="60" rx="4" fill="#b91c1c" opacity="0.3"/>
    <rect x="310" y="190" width="180" height="80" rx="4" fill="#dc2626" opacity="0.2"/>
    <rect x="310" y="280" width="180" height="100" rx="4" fill="#b91c1c" opacity="0.2"/>
    
    <!-- Frame 3 -->
    <rect x="550" y="100" width="200" height="300" rx="8" fill="none" stroke="#dc2626" stroke-width="2"/>
    <rect x="560" y="120" width="180" height="50" rx="4" fill="#dc2626" opacity="0.3"/>
    <rect x="560" y="180" width="180" height="120" rx="4" fill="#b91c1c" opacity="0.2"/>
    <rect x="560" y="310" width="100" height="30" rx="4" fill="#dc2626" opacity="0.4"/>
  </g>
  
  <!-- Figma Logo Inspired Design -->
  <g transform="translate(300, 450)">
    <circle cx="50" cy="0" r="25" fill="#dc2626" opacity="0.8"/>
    <circle cx="100" cy="0" r="25" fill="#b91c1c" opacity="0.8"/>
    <circle cx="150" cy="0" r="25" fill="#dc2626" opacity="0.6"/>
    <circle cx="200" cy="0" r="25" fill="#b91c1c" opacity="0.6"/>
  </g>
  
  <!-- Text -->
  <text x="400" y="550" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#dc2626" text-anchor="middle">
    FIGMA DESIGN WORK
  </text>
  
  <!-- Decorative Elements -->
  <circle cx="100" cy="50" r="3" fill="#dc2626" opacity="0.5"/>
  <circle cx="700" cy="80" r="3" fill="#b91c1c" opacity="0.5"/>
  <circle cx="150" cy="450" r="3" fill="#dc2626" opacity="0.5"/>
  <circle cx="650" cy="500" r="3" fill="#b91c1c" opacity="0.5"/>
</svg>
